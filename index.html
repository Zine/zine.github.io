<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Curriculum Vitae</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bulma/0.7.1/css/bulma.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bulma/0.7.1/css/bulma.min.map" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
    <script defer src="https://use.fontawesome.com/releases/v5.0.7/js/all.js"></script>
    <link href="https://use.fontawesome.com/releases/v5.0.7/css/all.css" rel="stylesheet">
</head>
<body>
<div id="app">
    <div>
        <nav class="navbar has-shadow is-spaced" id="navbar">
            <div class="container">
                <div class="navbar-brand">
                    <a href="/" class="navbar-item" id="navbar-title">Curriculum Vitae</a>
                </div>
                <div id="navbar-right">
                    <div class="navbar-item">
                        <div class="field is-grouped is-grouped-multiline">
                            <p class="control">
                                <a href="#" class="button is-primary">Contact me</a>
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </nav>
    </div>
    <div>
        <section class="hero is-primary is-medium">
            <div class="hero-bg" id="animationBG">
                <div class="hero-head"></div>
                <div class="hero-body">
                    <div class="container">
                        <h1 class="title" id="animationTitle">Welcome to my profile</h1>
                        <h2 class="subtitle" id="animationSub">Programming and compurtes <i class="material-icons is-primary" id="blue-heart">favorite</i></h2>
                    </div>
                </div>
            </div>
        </section>
        <section class="section">
            <div class="container">
                <div>
                    <h1 class="title text-center title-lighter">Personal Information</h1>
                    <div class="columns">
                        <div class="column is-narrow is-5 column-strong text-center">Full Name</div>
                        <div class="column text-center">Jesús David García Madriz</div>
                    </div>
                    <div class="columns">
                        <div class="column is-narrow is-5 column-strong text-center">Birth date</div>
                        <div class="column text-center">March 4, 1993</div>
                    </div>
                    <div class="columns">
                        <div class="column is-narrow is-5 column-strong text-center">Nationality</div>
                        <div class="column text-center">Venezuelan</div>
                    </div>
                </div>
            </div>
        </section>
        <section class="section">
            <div>
                <h1 class="title text-center title-lighter">Skills</h1>
                <div class="columns">
                    <div class="column is-3 column-auto" >
                        <img src="images/logos/android.png" width="121" alt="Android logo">
                    </div>
                    <div class="column is-3 column-auto">
                        <img src="images/logos/kotlin.png" width="72" alt="Kotlin logo">
                    </div>
                    <div class="column is-3 column-auto">
                        <img src="images/logos/html5.png" width="100" alt="HTML5 logo">
                    </div>
                    <div class="column is-3 column-auto">
                        <img src="images/logos/css3.png" width="72" alt="CSS3   logo">
                    </div>
                </div>
                <div class="columns">
                    <div class="column is-3 column-auto">
                        <img src="images/logos/javascript.png" width="72" alt="Javascript logo">
                    </div>
                </div>
            </div>
        </section>
    </div>
</div>
</body>
</html>
